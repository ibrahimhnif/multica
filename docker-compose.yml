name: multica

services:
  postgres:
    image: pgvector/pgvector:pg17
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-multica}
      POSTGRES_USER: ${POSTGRES_USER:-multica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-multica}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-multica} -d ${POSTGRES_DB:-multica}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    env_file: .env
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-multica}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-multica-secret}
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    env_file: .env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-multica} ${MINIO_ROOT_PASSWORD:-multica-secret};
      /usr/bin/mc mb local/multica-bucket --ignore-existing;
      /usr/bin/mc anonymous set public local/multica-bucket;
      exit 0;
      "

  migration:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    command: ["./migrate", "up"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-multica}:${POSTGRES_PASSWORD:-multica}@postgres:5432/${POSTGRES_DB:-multica}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-multica}:${POSTGRES_PASSWORD:-multica}@postgres:5432/${POSTGRES_DB:-multica}?sslmode=disable
      PORT: 8080
      S3_ENDPOINT: http://minio:9000
      # If S3_PUBLIC_ENDPOINT is not set in .env, it defaults to this
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_FORCE_PATH_STYLE: "true"
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-multica}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-multica-secret}
    depends_on:
      migration:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    env_file: .env
    ports:
      - "3000:3000"
    environment:
      REMOTE_API_URL: http://api:8080
      FRONTEND_PORT: 3000
    depends_on:
      - api

volumes:
  pgdata:
  miniodata:
